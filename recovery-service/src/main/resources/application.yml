server:
  port: 8087

spring:
  application:
    name: recovery-service
  config:
    import: optional:classpath:application-db.yml
  datasource:
    hikari:
      schema: recovery_schema
  jpa:
    properties:
      hibernate:
        default_schema: recovery_schema

management:
  endpoints:
    enabled-by-default: true
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://host.docker.internal:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}
